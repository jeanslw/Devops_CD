- hosts: all
  vars:
    image: "192.168.137.5/mycode/diagnosis-runtime"
    tag: "v20260716"
    project: "static"
  tasks:
    - name: Pull image
      shell: "docker pull {{ image }}"
      # image 已含完整路径+tag，CD 传参: -e image=registry/repo:tag

    - name: Stop old container
      shell: "docker stop {{ project }} || true"
      ignore_errors: true

    - name: Remove old container
      shell: "docker rm {{ project }} || true"
      ignore_errors: true

    - name: Run new container
      shell: "docker run -d --name {{ project }} --restart=always -p 80:80 {{ image }}"

    - name: Verify running image
      shell: "docker ps --filter name={{ project }} --filter status=running --format '{{ '{{' }}.Image{{ '}}' }}' | grep {{ tag }}"
      register: result

    - name: Show result
      debug:
        msg: "{{ result.stdout }}"
