# CD Service — 和 PHP Devops-Glue 搭配使用
# 数据库推荐 MySQL / MariaDB，和 PHP 端共用 devops_glue 库

services:
  cd-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cd-service
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      HOST: 0.0.0.0
      PORT: 8081
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # MySQL / MariaDB 模式（推荐）：和 PHP 端共用 devops_glue 库
    # 需要在 .env 中配置 DB_DRIVER=mysql 及连接信息
    networks:
      - devops-net

    # ── SQLite 模式（可选，取消下面注释并注释掉 networks）──
    # environment:
    #   DB_DRIVER: sqlite
    #   DB_PATH: /data/data.db
    # volumes:
    #   - ../Devops-Glue/config/data:/data:rw

networks:
  devops-net:
    external: true
